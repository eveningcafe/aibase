<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ax" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="70" y1="340" x2="540" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#ax)"/>
  <line x1="70" y1="340" x2="70" y2="40"  stroke="#475569" stroke-width="2" marker-end="url(#ax)"/>
  <text x="548" y="345" font-size="15" fill="#64748b">x</text>
  <text x="60"  y="34"  font-size="15" fill="#64748b">y</text>

  <!-- similar cluster: coffee + espresso (close) -->
  <line x1="170" y1="120" x2="150" y2="178" stroke="#a16207" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="196" y="150" font-size="13" fill="#a16207">near = similar meaning</text>

  <circle cx="170" cy="120" r="9" fill="#b45309"/>
  <text x="184" y="116" font-size="16" font-weight="bold" fill="#7c4a03">coffee</text>
  <circle cx="150" cy="178" r="9" fill="#d97706"/>
  <text x="164" y="183" font-size="16" font-weight="bold" fill="#7c4a03">espresso</text>

  <!-- far point: house -->
  <line x1="170" y1="120" x2="430" y2="285" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="250" y="225" font-size="13" fill="#64748b" transform="rotate(32 250 225)">far = different meaning</text>

  <circle cx="430" cy="285" r="9" fill="#2563eb"/>
  <text x="444" y="290" font-size="16" font-weight="bold" fill="#1e40af">house</text>

  <!-- caption -->
  <text x="305" y="385" text-anchor="middle" font-size="15" fill="#334155">position = meaning · distance = (dis)similarity</text>
</svg>
