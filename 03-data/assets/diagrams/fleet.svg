<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 430" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="up" markerWidth="10" markerHeight="10" refX="4" refY="2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,6 L4,0 L8,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- PLATFORM container -->
  <rect x="30" y="14" width="980" height="232" rx="14" fill="#eef4fb" stroke="#2563eb" stroke-width="1.5"/>
  <text x="50" y="42" font-size="18" font-weight="bold" fill="#1d4ed8">PLATFORM · you own — shared, versioned services</text>

  <!-- service boxes: row 1 -->
  <g font-size="15">
    <rect x="52"  y="58" width="216" height="68" rx="8" fill="#fff" stroke="#94a3b8"/>
    <text x="160" y="88"  text-anchor="middle" font-weight="bold">Embedding service</text>
    <text x="160" y="110" text-anchor="middle" font-size="12.5" fill="#64748b">one versioned model</text>

    <rect x="292" y="58" width="216" height="68" rx="8" fill="#fff" stroke="#94a3b8"/>
    <text x="400" y="88"  text-anchor="middle" font-weight="bold">Vector store</text>
    <text x="400" y="110" text-anchor="middle" font-size="12.5" fill="#64748b">multi-tenant · ACL</text>

    <rect x="532" y="58" width="216" height="68" rx="8" fill="#fff" stroke="#94a3b8"/>
    <text x="640" y="88"  text-anchor="middle" font-weight="bold">Model gateway</text>
    <text x="640" y="110" text-anchor="middle" font-size="12.5" fill="#64748b">LLM + reranker · quota</text>

    <rect x="772" y="58" width="216" height="68" rx="8" fill="#fff" stroke="#94a3b8"/>
    <text x="880" y="88"  text-anchor="middle" font-weight="bold">Ingestion orchestrator</text>
    <text x="880" y="110" text-anchor="middle" font-size="12.5" fill="#64748b">clean·chunk·embed·upsert</text>
  </g>

  <!-- service boxes: row 2 -->
  <g font-size="15">
    <rect x="52"  y="150" width="216" height="68" rx="8" fill="#fde68a" stroke="#d97706"/>
    <text x="160" y="180" text-anchor="middle" font-weight="bold" fill="#7c4a03">Eval gate (CI)</text>
    <text x="160" y="202" text-anchor="middle" font-size="12.5" fill="#7c4a03">drop in hit@k ⇒ build fails</text>

    <rect x="292" y="150" width="216" height="68" rx="8" fill="#fff" stroke="#94a3b8"/>
    <text x="400" y="180" text-anchor="middle" font-weight="bold">Observability</text>
    <text x="400" y="202" text-anchor="middle" font-size="12.5" fill="#64748b">traces · latency</text>

    <rect x="532" y="150" width="216" height="68" rx="8" fill="#fff" stroke="#94a3b8"/>
    <text x="640" y="180" text-anchor="middle" font-weight="bold">Cost metering</text>
    <text x="640" y="202" text-anchor="middle" font-size="12.5" fill="#64748b">per-app attribution</text>

    <rect x="772" y="150" width="216" height="68" rx="8" fill="#fff" stroke="#94a3b8"/>
    <text x="880" y="180" text-anchor="middle" font-weight="bold">Secrets / IAM</text>
    <text x="880" y="202" text-anchor="middle" font-size="12.5" fill="#64748b">governance · delete</text>
  </g>

  <!-- plug-in arrows (apps -> platform) -->
  <line x1="205" y1="320" x2="205" y2="250" stroke="#2563eb" stroke-width="2" marker-end="url(#up)"/>
  <line x1="525" y1="320" x2="525" y2="250" stroke="#2563eb" stroke-width="2" marker-end="url(#up)"/>
  <line x1="845" y1="320" x2="845" y2="250" stroke="#2563eb" stroke-width="2" marker-end="url(#up)"/>
  <rect x="430" y="272" width="180" height="26" rx="13" fill="#fff" stroke="#2563eb"/>
  <text x="520" y="290" text-anchor="middle" font-size="13.5" fill="#1d4ed8">plug in via config</text>

  <!-- app cards -->
  <g font-size="15">
    <rect x="60"  y="322" width="290" height="92" rx="10" fill="#f8fafc" stroke="#475569"/>
    <text x="78" y="350" font-weight="bold" fill="#0f172a">app-A · HR docs</text>
    <text x="78" y="376" font-size="13" fill="#475569">config: corpus · chunk · top-k</text>
    <text x="78" y="396" font-size="13" fill="#475569">prompt · model</text>

    <rect x="380" y="322" width="290" height="92" rx="10" fill="#f8fafc" stroke="#475569"/>
    <text x="398" y="350" font-weight="bold" fill="#0f172a">app-B · support KB</text>
    <text x="398" y="376" font-size="13" fill="#475569">config: corpus · chunk · top-k</text>
    <text x="398" y="396" font-size="13" fill="#475569">prompt · model</text>

    <rect x="700" y="322" width="290" height="92" rx="10" fill="#f8fafc" stroke="#475569"/>
    <text x="718" y="350" font-weight="bold" fill="#0f172a">app-C · legal  …</text>
    <text x="718" y="376" font-size="13" fill="#475569">config: corpus · chunk · top-k</text>
    <text x="718" y="396" font-size="13" fill="#475569">prompt · model</text>
  </g>
</svg>
